<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Not Found</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f8f8f8;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      width: 100%;
    }

    h1 {
      font-size: 8vw; /* responsive font */
      color: #ff4c4c;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.5rem;
      color: #333;
      margin-bottom: 30px;
    }

    a {
      display: inline-block;
      padding: 12px 25px;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-size: 1rem;
      transition: background 0.3s;
    }

    a:hover {
      background: #0056b3;
    }

    /* Responsive tweaks */
    @media (max-width: 600px) {
      h1 {
        font-size: 20vw;
      }

      p {
        font-size: 1.2rem;
      }

      a {
        padding: 10px 20px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>Oops! The page you are looking for doesn’t exist.</p>
    <a href="https://www.google.com/">Go Back Home</a>
  </div>
</body>
</html>
