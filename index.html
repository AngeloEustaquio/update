<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Angelo's Daily Updates 💌</title>
    <link rel="icon" type="image/x-icon" href="android-chrome-192x192.png" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", sans-serif;
        background-image: url(BackgroundImage.jpeg.jpeg);
        display: flex;
        justify-content: center;
        padding: 20px;
        background-position: center;
        background-attachment: fixed;
        background-repeat: no-repeat;
        background-size: cover;
      }

      .container {
        max-width: 800px;
        width: 100%;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column; /* NEW ENTRIES AT BOTTOM */
        background: rgba(255, 255, 255, 0.2);
        border: white solid 1px;
      }
      .textStorage {
        height: 680px;
        overflow-y: auto;
        width: clamp(420px, 90vw, auto);
        padding: 0px 10px 0px;
      }
      /* Scrollbar width */
      ::-webkit-scrollbar {
        width: 2px;
      }

      /* Scrollbar track (background) */
      ::-webkit-scrollbar-track {
        background: #ffe6eb;
        border-radius: 10px;
      }

      ::-webkit-scrollbar-thumb {
        background: #ff4d6d;
        border-radius: 10px;
      }

      h1 {
        text-align: center;
        color: #ff4d6d;
        margin-bottom: 25px;
      }

      /* Custom tag styling */
      update {
        display: block;
        background: #ffe6eb;
        padding: 15px;
        border-radius: 10px;
        margin: 20px 0px 20px;
        word-wrap: break-word;
      }

      update date {
        display: block;
        font-size: 12px;
        color: gray;
        margin-bottom: 5px;
      }

      update p {
        font-size: 16px;
        line-height: 1.5;
      }
      update img {
        width: clamp(200px, 18vw, 400px);
      }

      /* Form styling */
      form {
        background: #fff0f2;
        padding: 15px;
        border-radius: 10px;
        margin: 10px 0 0;
      }

      form input,
      form textarea {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 15px;
        resize: none;
      }

      form button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background-color: #ff4d6d;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }

      form button:hover {
        background-color: #ff1e4d;
      }

      /* Responsive */
      @media screen and (max-width: 480px) {
        h1 {
          font-size: 22px;
        }
        update p {
          font-size: 14px;
        }
      }
      iframe, img, vid {
        margin: 15px 0 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>My Daily Updates 💌</h1>
      <div class="textStorage">
        <update>
          <date>04/03/26, 9:50 AM</date>
          <p>murning, here it's already available</p>
          <br />
          <br />
          <a href="https://angeloeustaquio.github.io/GeloBot/">GeloBot</a>
        </update>
        <update>
          <date>03/03/26, 19:45 PM</date>
          <p>
            <a href="Screenshot from 2026-03-03 19-38-09.png" target="_blank">
              <img src="Screenshot from 2026-03-03 19-38-09.png" />
            </a>
            <br>
            This social studies took 40 minutes just to get perfect bruh. First Try.
          </p>
        </update>
        <update>
          <date>03/03/26, 19:45 PM</date>
          <p>
            Hello, The update will be reset every week so it wont compile up.
            <br />
            <br />
            Monday Morning.
          </p>
        </update>
      </div>
      <!-- Form for her reply -->
      <form action="https://formspree.io/f/mkovybyw" method="POST">
        <h2 style="color: #ff4d6d; margin-bottom: 10px">Message 💌</h2>
        <input type="text" name="name" placeholder="Your name" required />
        <textarea
          name="message"
          rows="4"
          placeholder="Write your message here..."
          required
        ></textarea>
        <button type="submit">Send ❤️</button>
      </form>
    </div>

      <script>
      setTimeout(() => {
        window.location.href = "error.html";
      },4000);
    </script>   
  -->
  </body>
</html>
