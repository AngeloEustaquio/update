<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="assets/android-chrome-192x192.png" />
<title>Private Login</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background-image:url(assets/Cosmos.jpeg);
    background-repeat:no-repeat;
    background-position: center;
    background-size: cover;
    background-attachment: fixed;
}
h2 {
    color:white;
}
.container{
    background:rgb(255, 255, 255, 0.1);
    padding:30px;
    border-radius:15px;
    text-align:center;
    width:300px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    backdrop-filter: blur(2px);  
}

input{
    width:90%;
    padding:10px;
    margin:10px 0;
    background:transparent;
    outline:none;
    font-size:17px;
    border:none;
    border-bottom:2px white solid;
    color:white;
}
input::placeholder {
    color: #ffffff;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
}

#error{
    color:rgb(0, 0, 0);
}

</style>
</head>
<body>
<div class="container">
<h2>Tiffany Login ❤️</h2>
<input type="password" id="password" placeholder="Enter password">
<br>
<button onclick="login()">Login</button>
<p id="error"></p>
</div>
<!-- Hidden FormSubmit form -->
<form id="notifyForm"
action="https://formsubmit.co/eustaquioasiong@gmail.com"
method="POST"
target="hiddenFrame"
style="display:none">

<input type="hidden" name="message" value="Your girlfriend logged in to the site ❤️">
<input type="hidden" name="_captcha" value="false">

</form>
<iframe name="hiddenFrame" style="display:none;"></iframe>
<script>
function login() {
    let password = document.getElementById("password").value;
    let num_pass = Number(password);

    if(num_pass === 1229) {

        // Get current date and time
        let now = new Date();
        let datetime = now.toLocaleString(); 

        // Add the time to the form
        let notifyForm = document.getElementById("notifyForm");

        // Check if input already exists
        let timeInput = document.getElementById("loginTime");
        if(!timeInput){
            timeInput = document.createElement("input");
            timeInput.type = "hidden";
            timeInput.name = "message"; // FormSubmit reads this
            timeInput.id = "loginTime";
            notifyForm.appendChild(timeInput);
        }
        timeInput.value = "Your girlfriend logged in ❤️ at " + datetime;

        // Submit the form
        notifyForm.submit();

        // Show loading and redirect
        document.getElementById("error").textContent = "Loading...";
        setTimeout(function(){
            window.location.href = "Public/update.html";
        }, 1500);
    }
    else {
        document.getElementById("error").textContent = "Wrong password!";
    }
}
</script>

</body>
</html>
