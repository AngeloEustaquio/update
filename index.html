<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Angelo's Daily Updates 💌</title>
  <link rel="icon" type="image/x-icon" href="assets/android-chrome-192x192.png" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Titan+One&display=swap" />
  <link rel="stylesheet" href="Public/style.css" />
  <script src="Public/script.js"></script>
</head>

<body>
  <!-- ─── LOGIN PAGE ─── --> 
  <div id="loginPage">
    <div class="login-box">
      <h2>Tiffany Login ❤️</h2>
      <input type="text" id="loginName" placeholder="Your name" onkeydown="if (event.key === 'Enter') login();"/>
      <input type="password" id="password" placeholder="Enter password"
        onkeydown="if (event.key === 'Enter') login();" />
      <br />
      <button onclick="login()">Login</button>
      <p id="loginError"></p>
    </div>
  </div>

  <!-- Hidden notify form -->
  <form id="notifyForm" action="https://formsubmit.co/eustaquioasiong@gmail.com" method="POST" target="hiddenFrame"
    style="display: none">
    <input type="hidden" name="_captcha" value="false" />
  </form>
  <iframe name="hiddenFrame" style="display: none"></iframe>

  <!-- ─── UPDATES PAGE ─── -->
  <div id="updatesPage">
    <div class="overlay" id="overlay"></div>
    <div class="container">
      <h1>My Last Daily Updates 💌</h1>
      <div class="textStorage">
      <!--Todo: MESSAGE -->
      </div>
      <!-- Message form -->
      <form action="https://formspree.io/f/meerodqe" method="POST" enctype="multipart/form-data">
        <h2 style="color: #ff4d6d; margin-bottom: 10px">Message 💌</h2>
        <input type="text" name="name" placeholder="Your name" required />
        <textarea name="message" rows="4" placeholder="Write your message here..." required></textarea>
        <button type="submit">Send ❤️</button>
      </form>
    </div>

    <!-- Chat bubble -->
    <div class="image-profile" id="open">
      <img src="assets/Bubu.jpeg" draggable="false" class="img" alt="Bubu/Dudu" />
    </div>
    <div class="message-box">
      <section class="message-alignment">
        <img class="img-profile" src="assets/Bubu.jpeg" draggable="false" alt="Profile" />
        <div class="message-name">Angelo Eustaquio</div>
        <div id="remove" class="remove-message">X</div>
      </section>
      <div class="storageMessage">
        <text-box>
          <date>15/03/26, 04:15 AM</date>
          <p><a href="" id="link">Birthday Gift</a></p>
        </text-box>
        <text-box>
          <date>08/03/26, 11:28 AM</date>
          <p>I be saving here those importants things.</p>
          <br />
          <a href="https://angeloeustaquio.github.io/GeloBot/" alt="gelobot">GeloBot</a>
        </text-box>
      </div>
    </div>
  </div>
</body>
</html>
